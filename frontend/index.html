<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LogLens — AI Log & Email Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080b0f;
  --surface: #0e1318;
  --surface2: #141b22;
  --border: #1e2a35;
  --accent: #00d9ff;
  --accent2: #ff6b35;
  --error: #ff4757;
  --warn: #ffa502;
  --info: #3498db;
  --success: #2ed573;
  --text: #e8edf2;
  --muted: #5a6a7a;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,217,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,217,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ─── */
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,11,15,0.9);
  backdrop-filter: blur(10px);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #0066ff);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text { font-family: var(--display); font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.logo-text span { color: var(--accent); }
.header-badge {
  font-size: 10px; letter-spacing: 2px; color: var(--muted);
  border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px;
}
.header-right { display: flex; align-items: center; gap: 16px; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ─── MAIN LAYOUT ─── */
.container {
  position: relative; z-index: 1;
  max-width: 1300px; margin: 0 auto;
  padding: 40px 40px;
}

/* ─── INPUT SECTION ─── */
.input-section {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
  margin-bottom: 32px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  transition: border-color 0.2s;
}
.panel:hover { border-color: rgba(0,217,255,0.2); }
.panel-title {
  font-family: var(--display); font-size: 13px; font-weight: 600;
  letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.panel-title::before {
  content: ''; width: 3px; height: 14px;
  background: var(--accent); border-radius: 2px;
}
textarea {
  width: 100%; height: 200px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: var(--mono); font-size: 12px; line-height: 1.6;
  padding: 14px; resize: vertical; outline: none;
  transition: border-color 0.2s;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }

/* Drop zone */
.drop-zone {
  height: 200px; border: 2px dashed var(--border);
  border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  cursor: pointer; transition: all 0.2s; background: var(--surface2);
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent); background: rgba(0,217,255,0.04);
}
.drop-icon { font-size: 36px; opacity: 0.4; }
.drop-text { font-size: 13px; color: var(--muted); text-align: center; }
.drop-text strong { color: var(--accent); }
#file-input { display: none; }
.file-selected {
  font-size: 11px; color: var(--success);
  background: rgba(46,213,115,0.1); padding: 6px 12px;
  border-radius: 4px; margin-top: 8px;
}

/* Analyze button */
.analyze-bar {
  display: flex; gap: 16px; align-items: center;
  margin-bottom: 40px;
}
.btn-analyze {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, var(--accent), #0088cc);
  color: #000; font-family: var(--display); font-weight: 700;
  font-size: 14px; letter-spacing: 1px;
  border: none; border-radius: 8px; padding: 14px 32px;
  cursor: pointer; transition: all 0.2s;
  text-transform: uppercase;
}
.btn-analyze:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,217,255,0.3); }
.btn-analyze:active { transform: translateY(0); }
.btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-clear {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: var(--mono); font-size: 12px;
  padding: 14px 20px; border-radius: 8px; cursor: pointer;
  transition: all 0.2s;
}
.btn-clear:hover { border-color: var(--muted); color: var(--text); }

/* Sample buttons */
.samples { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.sample-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.btn-sample {
  font-size: 11px; font-family: var(--mono);
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 12px; border-radius: 6px;
  cursor: pointer; transition: all 0.15s;
}
.btn-sample:hover { border-color: var(--accent2); color: var(--accent2); }

/* ─── LOADING ─── */
#loading {
  display: none; text-align: center; padding: 60px;
}
.spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--muted); font-size: 13px; }
.loading-text span { color: var(--accent); animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ─── RESULTS ─── */
#results { display: none; }

/* Summary bar */
.summary-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 28px;
  margin-bottom: 24px;
  display: flex; gap: 32px; align-items: flex-start;
  flex-wrap: wrap;
}
.summary-text { flex: 1; min-width: 300px; }
.summary-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
.summary-content { font-size: 14px; line-height: 1.7; color: var(--text); }
.severity-badge {
  padding: 6px 16px; border-radius: 20px; font-weight: 700;
  font-size: 12px; letter-spacing: 1.5px; white-space: nowrap;
  align-self: flex-start;
}
.severity-CRITICAL { background: rgba(255,71,87,0.15); color: var(--error); border: 1px solid rgba(255,71,87,0.3); }
.severity-HIGH { background: rgba(255,165,2,0.15); color: var(--warn); border: 1px solid rgba(255,165,2,0.3); }
.severity-MEDIUM { background: rgba(52,152,219,0.15); color: var(--info); border: 1px solid rgba(52,152,219,0.3); }
.severity-LOW { background: rgba(46,213,115,0.15); color: var(--success); border: 1px solid rgba(46,213,115,0.3); }

/* Stats row */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
  display: flex; flex-direction: column; gap: 6px;
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-label { font-size: 10px; letter-spacing: 1.5px; color: var(--muted); }
.stat-val { font-family: var(--display); font-size: 32px; font-weight: 800; }
.stat-card.errors .stat-val { color: var(--error); }
.stat-card.warnings .stat-val { color: var(--warn); }
.stat-card.info .stat-val { color: var(--info); }
.stat-card.success .stat-val { color: var(--success); }

/* Content grid */
.content-grid {
  display: grid; grid-template-columns: 1fr 340px; gap: 24px;
  margin-bottom: 24px;
}

/* Alerts list */
.alerts-list { display: flex; flex-direction: column; gap: 10px; }
.alert-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
  display: flex; gap: 14px; align-items: flex-start;
  transition: all 0.2s; cursor: default;
  animation: slideIn 0.3s ease forwards;
  opacity: 0; transform: translateX(-10px);
}
@keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
.alert-item:hover { border-color: rgba(0,217,255,0.2); background: var(--surface2); }

.level-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  min-width: 50px; text-align: center; margin-top: 2px;
}
.level-ERROR { background: rgba(255,71,87,0.15); color: var(--error); }
.level-ALERT { background: rgba(255,71,87,0.1); color: #ff6b7a; }
.level-WARN { background: rgba(255,165,2,0.15); color: var(--warn); }
.level-INFO { background: rgba(52,152,219,0.15); color: var(--info); }
.level-SUCCESS { background: rgba(46,213,115,0.15); color: var(--success); }

.alert-body { flex: 1; }
.alert-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.alert-message { font-size: 11px; color: var(--muted); line-height: 1.5; }
.alert-meta { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
.alert-ts { font-size: 10px; color: var(--muted); }
.alert-source {
  font-size: 10px; color: var(--accent); background: rgba(0,217,255,0.08);
  padding: 2px 7px; border-radius: 4px;
}
.alert-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: 9px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); padding: 2px 6px; border-radius: 3px;
}

/* Side panels */
.side-panels { display: flex; flex-direction: column; gap: 16px; }

/* Patterns */
.patterns-list { display: flex; flex-direction: column; gap: 10px; }
.pattern-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
}
.pattern-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.pattern-name { font-size: 12px; font-weight: 600; }
.pattern-count {
  font-size: 11px; color: var(--accent2);
  background: rgba(255,107,53,0.1); padding: 2px 8px;
  border-radius: 10px;
}
.pattern-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* Bar chart */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 10px; width: 60px; color: var(--muted); }
.bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.bar-fill.e { background: var(--error); }
.bar-fill.w { background: var(--warn); }
.bar-fill.i { background: var(--info); }
.bar-fill.s { background: var(--success); }
.bar-count { font-size: 10px; color: var(--text); width: 24px; text-align: right; }

/* Recommendations */
.recs-list { display: flex; flex-direction: column; gap: 8px; }
.rec-item {
  display: flex; gap: 10px; align-items: flex-start;
  font-size: 12px; color: var(--text); line-height: 1.5;
}
.rec-num {
  min-width: 20px; height: 20px;
  background: rgba(0,217,255,0.1); color: var(--accent);
  border-radius: 4px; font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}

/* Filter tabs */
.filter-tabs {
  display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
}
.filter-btn {
  font-family: var(--mono); font-size: 11px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--muted); padding: 6px 14px; border-radius: 6px;
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { color: var(--text); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,217,255,0.08); }

/* Empty / error states */
.error-banner {
  background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3);
  border-radius: 8px; padding: 16px 20px;
  color: var(--error); font-size: 13px; margin-bottom: 24px;
  display: none;
}

@media (max-width: 900px) {
  .input-section { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .content-grid { grid-template-columns: 1fr; }
  header { padding: 16px 20px; }
  .container { padding: 24px 20px; }
}
</style>
</head>

<div class="container">

    <!-- Main Content -->
    <div class="content-grid">
      <!-- Alerts -->
      <div>
        <div class="filter-tabs" id="filter-tabs">

          <button class="filter-btn" onclick="filterAlerts('ERROR', this)">ERROR</button>
          <button class="filter-btn" onclick="filterAlerts('WARN', this)">WARN</button>
          <button class="filter-btn" onclick="filterAlerts('INFO', this)">INFO</button>

        </div>
        <div class="alerts-list" id="alerts-list"></div>
      </div>

      <!-- Side panels -->
      <div class="side-panels">
        <!-- Distribution chart -->
        <div class="panel">
          <div class="panel-title">Distribution</div>

        </div>

        <!-- Patterns -->
        <div class="panel" id="patterns-panel">
          <div class="panel-title">Detected Patterns</div>

          <div class="recs-list" id="recs-list"></div>
        </div>
      </div>
    </div>
  </div>

</div>

function loadSample(type) {
  document.getElementById('text-input').value = SAMPLES[type];
  uploadedFile = null;
  document.getElementById('file-selected-name').style.display = 'none';
}

// ─── FILE UPLOAD ───────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });

function setFile(f) {
  uploadedFile = f;
  const el = document.getElementById('file-selected-name');
  el.textContent = `✓ ${f.name} (${(f.size/1024).toFixed(1)} KB)`;
  el.style.display = 'block';
}

// ─── ANALYZE ──────────────────────────────────────────────
async function analyze() {
  const text = document.getElementById('text-input').value.trim();
  if (!text && !uploadedFile) {
    showError('Please paste some logs/emails or upload a file first.');
    return;
  }

  setLoading(true);
  hideError();

  try {
    let response;
    if (uploadedFile) {
      const formData = new FormData();
      formData.append('file', uploadedFile);
      response = await fetch('/api/analyze/file', { method: 'POST', body: formData });
    } else {
      response = await fetch('/api/analyze/text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
    }
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.detail || 'Analysis failed');
    }
    const data = await response.json();
    renderResults(data);
  } catch (e) {
    showError('Error: ' + e.message);
  } finally {
    setLoading(false);
  }
}

// ─── RENDER ───────────────────────────────────────────────
function renderResults(data) {
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });

  // Summary
  document.getElementById('r-summary').textContent = data.summary || '—';
  const sevEl = document.getElementById('r-severity');
  sevEl.textContent = data.severity || 'UNKNOWN';
  sevEl.className = 'severity-badge severity-' + (data.severity || 'LOW');

  // Stats
  const s = data.stats || {};
  animateCount('r-errors', s.errors || 0);
  animateCount('r-warnings', s.warnings || 0);
  animateCount('r-info', s.info || 0);
  animateCount('r-success', s.success || 0);

  // Bar chart
  const total = Math.max(1, (s.errors||0)+(s.warnings||0)+(s.info||0)+(s.success||0));
  document.getElementById('bar-chart').innerHTML = [
    { label:'Errors', val: s.errors||0, cls:'e' },
    { label:'Warnings', val: s.warnings||0, cls:'w' },
    { label:'Info', val: s.info||0, cls:'i' },
    { label:'Success', val: s.success||0, cls:'s' },
  ].map(r => `
    <div class="bar-row">
      <div class="bar-label">${r.label}</div>
      <div class="bar-track"><div class="bar-fill ${r.cls}" style="width:${Math.round(r.val/total*100)}%"></div></div>
      <div class="bar-count">${r.val}</div>
    </div>`).join('');

  // Alerts
  allAlerts = data.alerts || [];
  renderAlerts(allAlerts);

  // Patterns
  const patterns = data.patterns || [];
  document.getElementById('patterns-panel').style.display = patterns.length ? '' : 'none';
  document.getElementById('patterns-list').innerHTML = patterns.map(p => `
    <div class="pattern-item">
      <div class="pattern-header">
        <div class="pattern-name">${esc(p.name)}</div>
        <div class="pattern-count">×${p.count}</div>
      </div>
      <div class="pattern-desc">${esc(p.description)}</div>
    </div>`).join('');

  // Recommendations
  const recs = data.recommendations || [];
  document.getElementById('recs-panel').style.display = recs.length ? '' : 'none';
  document.getElementById('recs-list').innerHTML = recs.map((r, i) => `
    <div class="rec-item">
      <div class="rec-num">${i+1}</div>
      <div>${esc(r)}</div>
    </div>`).join('');
}

function renderAlerts(alerts) {
  document.getElementById('alerts-list').innerHTML = alerts.length
    ? alerts.map((a, i) => `
      <div class="alert-item" style="animation-delay:${i*40}ms">
        <div class="level-badge level-${a.level || 'INFO'}">${a.level || 'INFO'}</div>
        <div class="alert-body">
          <div class="alert-title">${esc(a.title)}</div>
          <div class="alert-message">${esc(a.message)}</div>
          <div class="alert-meta">
            ${a.timestamp ? `<div class="alert-ts">🕐 ${esc(a.timestamp)}</div>` : ''}
            ${a.source ? `<div class="alert-source">${esc(a.source)}</div>` : ''}
            ${(a.tags||[]).length ? `<div class="alert-tags">${a.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
          </div>
        </div>
      </div>`).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:20px">No events match this filter.</div>';
}

function filterAlerts(level, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAlerts(level === 'ALL' ? allAlerts : allAlerts.filter(a => a.level === level));
}

// ─── HELPERS ──────────────────────────────────────────────
function animateCount(id, target) {
  const el = document.getElementById(id);
  let cur = 0; const step = Math.max(1, Math.ceil(target / 20));
  const t = setInterval(() => {
    cur = Math.min(cur + step, target);
    el.textContent = cur;
    if (cur >= target) clearInterval(t);
  }, 30);
}

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('results').style.display = on ? 'none' : (allAlerts.length ? 'block' : 'none');
  document.getElementById('analyze-btn').disabled = on;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}
function clearAll() {
  document.getElementById('text-input').value = '';
  uploadedFile = null;
  document.getElementById('file-selected-name').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  hideError(); allAlerts = [];
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
